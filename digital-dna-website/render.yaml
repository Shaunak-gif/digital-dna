services:
  - type: web
    name: digitaldna-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: digitaldna-db
          property: connectionString
      - key: MODEL_PATH
        value: ./models
    autoDeploy: true

databases:
  - name: digitaldna-db
    plan: free
